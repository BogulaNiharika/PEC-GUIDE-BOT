<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pec Guide Bot – Pragati Guide Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="main-container">
    <div class="side-image left">
      <img src="https://cdn.pixabay.com/photo/2019/04/08/08/18/ai-4101441_1280.png" alt="AI Robot" class="robot-img" />
    </div>

    <div class="chat-area">
      <h1 class="title">Pec Guide Bot</h1>
      <h3 class="subtitle">Pragati Guide Bot</h3>

      <div id="chatbox" class="chatbox"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something like 'Where is ECE?'" />
        <button onclick="processInput()">Send</button>
        <button onclick="startListening()" title="Speak">🎤</button>
      </div>
    </div>

    <div class="side-image right">
      <img src="https://cdn.pixabay.com/photo/2016/03/27/19/41/students-1281937_1280.jpg" alt="Students" class="students-img" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
